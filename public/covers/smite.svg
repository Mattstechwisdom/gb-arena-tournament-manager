<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(96 80% 55%)"/>
      <stop offset="55%" stop-color="hsl(136 80% 45%)"/>
      <stop offset="100%" stop-color="hsl(181 80% 40%)"/>
    </linearGradient>

    <radialGradient id="glow" cx="25%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
    </pattern>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="600" height="800" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="800" fill="url(#grid)"/>

  <circle cx="140" cy="120" r="260" fill="url(#glow)"/>
  <circle cx="520" cy="360" r="190" fill="#ffffff" opacity="0.08" filter="url(#soft)"/>

  <rect x="0" y="0" width="600" height="800" fill="url(#shade)"/>

  <text x="32" y="56" fill="#ffffff" opacity="0.85" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="700" letter-spacing="4">GB ARENA</text>

  <!-- Embedded title for accessibility; UI overlays the visible title -->
  <title>SMITE</title>
</svg>
